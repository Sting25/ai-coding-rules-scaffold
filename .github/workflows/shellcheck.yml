name: shellcheck

# Runs on the scaffold's own shell scripts — NOT installed into consumer
# projects (unlike lint.yml.template). Only scripts meant to execute as-is
# are checked; *.template files are templates but still valid bash.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: shellcheck -S info install.sh uninstall.sh githooks/pre-commit.template
